<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读书会人格测试 · 你是哪种角色？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FDF6EC;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --sub: #7A7A7A;
    --accent: #D4845A;
    --accent2: #E8A87C;
    --accent-light: #F5E6D8;
    --border: #E8D5C4;
    --tag-bg: #FAF0E6;
    --shadow: rgba(180, 120, 60, 0.12);
  }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* 进度条 */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
    z-index: 100;
    border-radius: 0 2px 2px 0;
  }

  /* 屏幕容器 */
  .screen {
    display: none;
    width: 100%;
    max-width: 680px;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 封面 */
  .cover-icon {
    font-size: 72px;
    margin-bottom: 20px;
    line-height: 1;
  }

  .cover-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .cover-subtitle {
    font-size: 15px;
    color: var(--sub);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.7;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .tag {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* 封面人格展示 */
  .cover-roles-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  .cover-roles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 28px;
  }
  .cover-role-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    transition: all 0.2s;
    cursor: default;
  }
  .cover-role-item:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateY(-2px);
  }
  .cover-role-item .cr-emoji {
    font-size: 24px;
    display: block;
    margin-bottom: 4px;
    line-height: 1;
  }
  .cover-role-item .cr-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  /* 按钮 */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 14px 48px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 40px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px var(--shadow);
    letter-spacing: 1px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(180, 120, 60, 0.3);
  }
  .btn-primary:active { transform: translateY(0); }

  /* 题目 */
  .question-counter {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 8px;
    letter-spacing: 1px;
    align-self: flex-start;
  }
  .question-text {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 28px;
    color: var(--text);
    align-self: flex-start;
  }
  .question-text .scene {
    font-size: 14px;
    color: var(--sub);
    font-weight: 400;
    display: block;
    margin-bottom: 10px;
    padding: 8px 14px;
    background: var(--tag-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    line-height: 1.5;
  }

  /* 选项 */
  .options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .option:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(4px);
  }
  .option.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    color: var(--sub);
    font-size: 13px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option.selected .option-letter {
    background: var(--accent);
    color: white;
  }
  .option-text { font-size: 15px; line-height: 1.5; padding-top: 3px; }

  /* 结果 */
  .result-card {
    background: var(--card);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 8px 32px var(--shadow);
    border: 1px solid var(--border);
    width: 100%;
  }
  .result-type-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .result-emoji { font-size: 80px; margin-bottom: 16px; line-height: 1; }
  .result-name {
    font-size: 30px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .result-sub {
    font-size: 14px;
    color: var(--sub);
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .result-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 24px;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    text-align: left;
    margin-bottom: 28px;
  }
  .result-desc p { margin-bottom: 12px; }
  .result-traits {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 28px;
  }
  .trait-tag {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .score-line {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 20px;
  }
  .score-bar-bg {
    background: #EDE3D8;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .score-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 1s ease;
  }
  .score-label {
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 20px;
  }

  /* 其他人格 */
  .others-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--sub);
    margin: 28px 0 14px;
    text-align: left;
  }
  .other-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
  }
  .other-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--sub);
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .other-item .o-emoji { font-size: 18px; }
  .other-item .o-name { font-weight: 600; color: var(--text); }
  .other-item .o-score {
    margin-left: auto;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn-secondary {
    background: white;
    color: var(--accent);
    border: 2px solid var(--border);
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent); }
</style>
</head>
<body>

// 封面展示12人格
(function renderCoverRoles() {
  const grid = document.getElementById('cover-roles');
  if (!grid) return;
  let html = '';
  personalities.forEach(p => {
    html += `
      <div class="cover-role-item">
        <span class="cr-emoji">${p.emoji}</span>
        <span class="cr-name">${p.name}</span>
      </div>`;
  });
  grid.innerHTML = html;
})();

let currentQ = 0;
let scores = {};
personalities.forEach(p => scores[p.id] = 0);

function startTest() {
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-question').classList.add('active');
  currentQ = 0;
  personalities.forEach(p => scores[p.id] = 0);
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
  document.getElementById('progress-bar').style.width = ((currentQ + 1) / questions.length * 100) + '%';

  let html = `<span class="scene">情境 ${currentQ + 1}</span>${q.text}`;
  document.getElementById('q-text').innerHTML = html;

  const letters = ['A', 'B', 'C', 'D'];
  let optHtml = '';
  q.options.forEach((opt, i) => {
    optHtml += `
      <div class="option" onclick="selectOption(${i})">
        <div class="option-letter">${letters[i]}</div>
        <div class="option-text">${opt.text}</div>
      </div>`;
  });
  document.getElementById('q-options').innerHTML = optHtml;
}

function selectOption(idx) {
  // 取消其他选中
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option')[idx].classList.add('selected');

  // 计分
  const types = questions[currentQ].options[idx].types;
  types.forEach(t => scores[t] += 1);

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('screen-question').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('progress-bar').style.width = '100%';

  // 找最高分
  let maxScore = 0, topType = null;
  const sorted = [];
  personalities.forEach(p => {
    sorted.push({ id: p.id, score: scores[p.id] });
  });
  sorted.sort((a, b) => b.score - a.score);

  const result = personalities.find(p => p.id === sorted[0].id);
  const topScore = sorted[0].score;
  const maxPossible = questions.length * 2; // 每题最多2分
  const pct = Math.round(topScore / maxPossible * 100);

  document.getElementById('r-tag').textContent = '你的读书会人格';
  document.getElementById('r-emoji').textContent = result.emoji;
  document.getElementById('r-name').textContent = result.name;
  document.getElementById('r-sub').textContent = result.subtitle;
  document.getElementById('r-desc').innerHTML = result.desc;

  let traitsHtml = '';
  result.traits.forEach(t => traitsHtml += `<span class="trait-tag">${t}</span>`);
  document.getElementById('r-traits').innerHTML = traitsHtml;

  document.getElementById('score-label').textContent =
    `${topScore} / ${maxPossible} 分（匹配度 ${pct}%）`;

  setTimeout(() => {
    document.getElementById('score-bar').style.width = pct + '%';
  }, 300);

  // 其他人格
  let othersHtml = '';
  sorted.slice(0, 6).forEach((item, i) => {
    const p = personalities.find(pp => pp.id === item.id);
    const subPct = Math.round(item.score / maxPossible * 100);
    othersHtml += `
      <div class="other-item">
        <span class="o-emoji">${p.emoji}</span>
        <span class="o-name">${p.name}</span>
        <span class="o-score">${subPct}%</span>
      </div>`;
  });
  document.getElementById('other-list').innerHTML = othersHtml;
}
